name: Daily Pharma News

on:
  workflow_dispatch:
    inputs:
      use_sample_data:
        description: 'モックRSS（fixtures/sample-rss-tweets.json）で動作確認'
        type: boolean
        default: false
  schedule:
    - cron: '30 22 * * 0-4'  # 平日 07:30 JST（月〜金）= UTCでは日〜木 22:30

permissions:
  contents: read

concurrency:
  group: daily-pharma-news
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      # 配信済みURL・URL要約キャッシュを前回実行から復元（同一 artifact は別 run から取れないため cache を使用）
      - uses: actions/cache@v4
        id: pharma-local-cache
        with:
          path: .cache
          key: pharma-news-local-cache-${{ github.ref_name }}-v1

      - run: npm ci

      # schedule では workflow_dispatch の inputs が無い。inputs.* だけだと環境や GHA の版で挙動がブレるため明示する。
      - run: npm start
        env:
          USE_SAMPLE_DATA: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.use_sample_data == 'true' && 'true' || 'false' }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
